name: market_ledger
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: 6.1.5+1

  # Date handling
  intl: ^0.19.0
  
  # Local storage for settings
  path_provider: 2.1.5
  shared_preferences: 2.5.3

   # مكتبات الأمان والحماية
  device_info_plus: 10.1.2

  http: ^1.1.0  # لإجراء طلبات الشبكة

   # PDF Generation for printing invoices
  pdf: ^3.10.4
  share_plus: ^7.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  
flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Cairo-Regular.ttf

# 👇 قسم أيقونة التطبيق
flutter_launcher_icons:
  android: true
  